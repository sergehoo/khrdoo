# =============================================================================
#  Traefik v3 — Configuration statique (déploiement autonome)
#  NB : sous Dokploy, ce fichier est ignoré — Traefik est géré par Dokploy.
# =============================================================================

global:
  checkNewVersion: true
  sendAnonymousUsage: false

# --- Points d'entrée ----------------------------------------------------------
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      middlewares:
        - secure-headers@file
      tls:
        certResolver: letsencrypt
    transport:
      respondingTimeouts:
        readTimeout: 600s        # rapports Odoo / imports longs
        writeTimeout: 600s
        idleTimeout: 180s

# --- API / Dashboard ----------------------------------------------------------
api:
  dashboard: true
  insecure: false

# --- Fournisseurs -------------------------------------------------------------
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: dokploy-network
  file:
    directory: /etc/traefik/dynamic
    watch: true

# --- Résolveur ACME (Let's Encrypt) ------------------------------------------
certificatesResolvers:
  letsencrypt:
    acme:
      email: "${ACME_EMAIL}"
      storage: /acme.json
      keyType: EC256
      # Challenge HTTP-01 (port 80 ouvert). Pour DNS-01, voir documentation.
      httpChallenge:
        entryPoint: web
      # Décommentez pour tester sans atteindre les quotas Let's Encrypt :
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory

# --- TLS : versions minimales et suites sécurisées ---------------------------
tls:
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305

# --- Journalisation -----------------------------------------------------------
log:
  level: INFO
  format: json
accessLog:
  format: json
  filters:
    statusCodes:
      - "400-499"
      - "500-599"

# --- Métriques (scrapées par Prometheus) -------------------------------------
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true

ping: {}
