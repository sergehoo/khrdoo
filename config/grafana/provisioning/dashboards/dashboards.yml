# =============================================================================
#  Grafana — provisionnement des tableaux de bord
# =============================================================================
apiVersion: 1

providers:
  - name: Kaydan
    orgId: 1
    folder: Kaydan ERP
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
