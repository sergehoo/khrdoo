# =============================================================================
#  PostgreSQL 16 — Configuration optimisée Odoo  (profil MEDIUM ≈ 8 Go RAM)
#  Pour SMALL : shared_buffers=1GB, effective_cache_size=3GB, max_connections=100
#  Pour ENTERPRISE : shared_buffers=4GB, effective_cache_size=12GB, max_connections=300
# =============================================================================

# --- Connexions --------------------------------------------------------------
listen_addresses = '*'
max_connections = 200
superuser_reserved_connections = 3
password_encryption = scram-sha-256

# --- Mémoire -----------------------------------------------------------------
shared_buffers = 2GB                  # ≈ 25 % de la RAM
effective_cache_size = 6GB            # ≈ 75 % de la RAM
work_mem = 16MB
maintenance_work_mem = 512MB
huge_pages = try

# --- WAL / checkpoints (durabilité + perf écriture) --------------------------
wal_level = replica
max_wal_size = 2GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
wal_compression = on
synchronous_commit = on
archive_mode = off                    # activer pour PITR (voir docs/07)

# --- Planificateur (SSD/NVMe) ------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# --- Parallélisme ------------------------------------------------------------
max_worker_processes = 4
max_parallel_workers = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# --- Auto-vacuum (important pour Odoo : forte rotation de lignes) ------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# --- Timeouts ----------------------------------------------------------------
idle_in_transaction_session_timeout = 600000   # 10 min
statement_timeout = 0
lock_timeout = 0
tcp_keepalives_idle = 60

# --- Journalisation (captée par Promtail/Loki via stderr) --------------------
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000     # log des requêtes > 1 s (détection lenteurs)
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%m [%p] %q%u@%d '
log_timezone = 'UTC'
datestyle = 'iso, mdy'
timezone = 'UTC'

# --- Extensions préchargées (pg_stat_statements pour le monitoring) ----------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
