# =============================================================================
#  ODOO 18 — Configuration ACTIVE (profil MEDIUM par défaut)
# -----------------------------------------------------------------------------
#  ⚠ Ce fichier est RÉGÉNÉRÉ par `make tune` / scripts/tune.sh à partir de .env
#     et du profil ODOO_PROFILE. Les identifiants BD sont injectés par l'image
#     Odoo via les variables HOST/USER/PASSWORD (voir docker-compose.yml).
#  ⚠ Avant production : exécuter `make secrets && make tune` pour renseigner
#     admin_passwd depuis .env (ODOO_ADMIN_PASSWD).
# =============================================================================
[options]
admin_passwd = CHANGE_ME_master_password

; --- Base de données (db_host/db_user/db_password injectés par l'entrypoint) -
db_maxconn = 20
db_template = template0
dbfilter = ^kaydan.*$
list_db = False

; --- Chemins ---------------------------------------------------------------
addons_path = /mnt/extra-addons,/mnt/extra-addons/oca
data_dir = /var/lib/odoo

; --- Réseau / proxy --------------------------------------------------------
proxy_mode = True
http_enable = True
http_interface = 0.0.0.0
http_port = 8069
gevent_port = 8072

; --- Workers / cron --------------------------------------------------------
workers = 4
max_cron_threads = 2

; --- Mémoire (octets) ------------------------------------------------------
limit_memory_soft = 1073741824
limit_memory_hard = 1342177280

; --- Temps d'exécution -----------------------------------------------------
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1
limit_request = 8192

; --- Journalisation / sécurité ---------------------------------------------
log_level = info
log_handler = :INFO
log_db = False
logfile = False
without_demo = all
server_wide_modules = base,web
