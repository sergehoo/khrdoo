# =============================================================================
#  ODOO 18 — Profil MEDIUM  (≈ 8 Go RAM / 4 vCPU · 20-50 utilisateurs)  [ACTIF]
#  TEMPLATE : rendu par scripts/tune.sh (envsubst) -> config/odoo/odoo.conf
# =============================================================================
[options]
admin_passwd = ${ODOO_ADMIN_PASSWD}

; --- Base de données -------------------------------------------------------
db_host = postgres
db_port = 5432
db_user = ${POSTGRES_USER}
db_password = ${POSTGRES_PASSWORD}
db_maxconn = 20
db_template = template0
dbfilter = ^${ODOO_DB_NAME}.*$
list_db = False

; --- Chemins ---------------------------------------------------------------
addons_path = /mnt/extra-addons,/mnt/extra-addons/oca
data_dir = /var/lib/odoo

; --- Réseau / proxy --------------------------------------------------------
proxy_mode = True
http_enable = True
http_interface = 0.0.0.0
http_port = 8069
gevent_port = 8072

; --- Workers / cron --------------------------------------------------------
; Règle : workers ≈ (vCPU * 2) + 1, plafonné par la RAM (~1,2 Go / worker)
workers = 4
max_cron_threads = 2

; --- Mémoire (octets) ------------------------------------------------------
limit_memory_soft = 1073741824
limit_memory_hard = 1342177280

; --- Temps d'exécution -----------------------------------------------------
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1
limit_request = 8192

; --- Journalisation / sécurité ---------------------------------------------
log_level = info
log_handler = :INFO
log_db = False
logfile = False
without_demo = all
server_wide_modules = base,web
