# =============================================================================
#  ODOO 18 — Profil SMALL  (≈ 4 Go RAM / 2 vCPU · < 15 utilisateurs)
#  TEMPLATE : rendu par scripts/tune.sh (envsubst) -> config/odoo/odoo.conf
# =============================================================================
[options]
admin_passwd = ${ODOO_ADMIN_PASSWD}

; --- Base de données -------------------------------------------------------
db_host = postgres
db_port = 5432
db_user = ${POSTGRES_USER}
db_password = ${POSTGRES_PASSWORD}
db_maxconn = 16
db_template = template0
dbfilter = ^${ODOO_DB_NAME}.*$
list_db = False

; --- Chemins ---------------------------------------------------------------
addons_path = /mnt/extra-addons,/mnt/extra-addons/oca
data_dir = /var/lib/odoo

; --- Réseau / proxy --------------------------------------------------------
proxy_mode = True
http_enable = True
http_interface = 0.0.0.0
http_port = 8069
gevent_port = 8072

; --- Workers / cron --------------------------------------------------------
workers = 2
max_cron_threads = 1

; --- Mémoire (octets) ------------------------------------------------------
limit_memory_soft = 805306368
limit_memory_hard = 1006632960

; --- Temps d'exécution -----------------------------------------------------
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1
limit_request = 8192

; --- Journalisation / sécurité ---------------------------------------------
log_level = info
log_handler = :INFO
log_db = False
logfile = False
without_demo = all
server_wide_modules = base,web
