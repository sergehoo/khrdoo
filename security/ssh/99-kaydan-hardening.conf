# =============================================================================
#  Kaydan ERP — Durcissement SSH (drop-in /etc/ssh/sshd_config.d/)
#  Installé par security/harden.sh — testez AVANT de fermer votre session !
# =============================================================================

# Port SSH (changez-le si besoin et adaptez UFW + jail Fail2Ban)
Port 22

# Authentification : clés uniquement, jamais par mot de passe
PubkeyAuthentication yes
PasswordAuthentication no
PermitEmptyPasswords no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
UsePAM yes

# Root : connexion par clé uniquement (mot de passe root désactivé)
# Passez à "no" si vous disposez d'un utilisateur sudo dédié.
PermitRootLogin prohibit-password

# Réduction de la surface d'attaque
MaxAuthTries 3
MaxSessions 4
LoginGraceTime 30
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
PermitTunnel no
PrintMotd no

# Sessions inactives : déconnexion automatique (10 min)
ClientAliveInterval 300
ClientAliveCountMax 2

# Bannière légale
Banner /etc/issue.net

# Cryptographie moderne uniquement
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
