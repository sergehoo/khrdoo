# =============================================================================
#  Fail2Ban — filtre des réponses 401/403/429 du reverse proxy (Traefik)
#  Lit les logs d'accès JSON de Traefik encapsulés par Docker (quotes échappées).
#  ⚠ À VALIDER contre le format réel : fail2ban-regex <log> <ce_fichier>
#  Installé dans /etc/fail2ban/filter.d/traefik-auth.conf
# =============================================================================
[Definition]
failregex = \\"ClientHost\\":\\"<HOST>\\".*\\"(DownstreamStatus|OriginStatus)\\":(401|403|429)
            \\"(DownstreamStatus|OriginStatus)\\":(401|403|429).*\\"ClientHost\\":\\"<HOST>\\"
            "ClientHost":"<HOST>".*"(DownstreamStatus|OriginStatus)":(401|403|429)

ignoreregex =
