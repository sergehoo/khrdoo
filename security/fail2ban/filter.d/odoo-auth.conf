# =============================================================================
#  Fail2Ban — filtre des échecs d'authentification Odoo
#  Lit les logs JSON du conteneur Odoo (proxy_mode=True -> IP client réelle).
#  Installé dans /etc/fail2ban/filter.d/odoo-auth.conf
# =============================================================================
[Definition]
failregex = Login failed for db:\S+\s+login:\S*\s+from <HOST>
            (?i)authentication\s+failed.*from <HOST>
            (?i)login\s+failed.*from <HOST>

ignoreregex =

# Test : fail2ban-regex /var/lib/docker/containers/*/*-json.log \
#        /etc/fail2ban/filter.d/odoo-auth.conf
