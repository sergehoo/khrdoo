# =============================================================================
#  KAYDAN ERP — Stack de production
#  Odoo 18 Community + OCA · PostgreSQL 16 · Redis · MinIO
#  Monitoring (Prometheus/Grafana/Loki) · Backup chiffré · Watchtower
#  SSO : Keycloak EXTERNE (déjà en prod) — Odoo s'y connecte en OIDC, non déployé ici
#
#  Cible        : Dokploy + Traefik (Ubuntu 24.04 VPS)
#  Réseau       : se rattache au réseau externe "dokploy-network" (Traefik)
#  Pré-requis   : .env renseigné · scripts/tune.sh exécuté (génère odoo.conf)
#                 docker network create dokploy-network  (créé par Dokploy)
#
#  NOTE Dokploy : Traefik est entièrement géré par Dokploy. Aucun service ni
#                 fichier de config Traefik ici — seuls les LIBELLÉS (labels)
#                 des services décrivent le routage à la Traefik de Dokploy.
# =============================================================================
name: kaydan-erp

# --- Ancres réutilisables -----------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-security-opt: &hardening
  security_opt:
    - no-new-privileges:true

networks:
  # Réseau public géré par Traefik/Dokploy (services exposés en HTTPS)
  dokploy-network:
    external: true
  # Réseau privé interservices (non exposé)
  internal:
    name: kaydan-internal
    driver: bridge

volumes:
  postgres-data:
    name: kaydan-postgres-data
  odoo-data:
    name: kaydan-odoo-data          # /var/lib/odoo : filestore + sessions
  pgadmin-data:
    name: kaydan-pgadmin-data
  redis-data:
    name: kaydan-redis-data
  minio-data:
    name: kaydan-minio-data
  prometheus-data:
    name: kaydan-prometheus-data
  grafana-data:
    name: kaydan-grafana-data
  loki-data:
    name: kaydan-loki-data

services:

  # ===========================================================================
  #  POSTGRESQL 16 — base de données Odoo
  # ===========================================================================
  postgres:
    image: postgres:${POSTGRES_VERSION:-16}-bookworm
    container_name: kaydan-postgres
    restart: unless-stopped
    <<: *hardening
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant}
      # Variables consommées par les scripts d'init (config/postgres/init/*)
      PG_EXPORTER_USER: ${PG_EXPORTER_USER:-odoo_exporter}
      PG_EXPORTER_PASSWORD: ${PG_EXPORTER_PASSWORD:?PG_EXPORTER_PASSWORD manquant}
      TZ: ${TZ:-UTC}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/postgres/init:/docker-entrypoint-initdb.d:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  # ===========================================================================
  #  ODOO 18 — application ERP
  # ===========================================================================
  odoo:
    image: odoo:${ODOO_VERSION:-18}
    container_name: kaydan-odoo
    restart: unless-stopped
    <<: *hardening
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      HOST: postgres
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
    volumes:
      - odoo-data:/var/lib/odoo
      - ./config/odoo/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./addons:/mnt/extra-addons:ro          # kaydan_branding + oca/ (modules OCA)
    networks:
      - internal
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # --- Middleware sécurité (en-têtes HTTP) défini une fois ici ----------
      - traefik.http.middlewares.kaydan-sec.headers.stsSeconds=31536000
      - traefik.http.middlewares.kaydan-sec.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.kaydan-sec.headers.stsPreload=true
      - traefik.http.middlewares.kaydan-sec.headers.forceSTSHeader=true
      - traefik.http.middlewares.kaydan-sec.headers.contentTypeNosniff=true
      - traefik.http.middlewares.kaydan-sec.headers.browserXssFilter=true
      - traefik.http.middlewares.kaydan-sec.headers.customFrameOptionsValue=SAMEORIGIN
      - traefik.http.middlewares.kaydan-sec.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.kaydan-sec.headers.customResponseHeaders.X-Robots-Tag=noindex,nofollow,noarchive
      - "traefik.http.middlewares.kaydan-sec.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"
      # --- Rate limit anti-bruteforce ---------------------------------------
      - traefik.http.middlewares.kaydan-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.kaydan-ratelimit.ratelimit.burst=50
      # --- Compression ------------------------------------------------------
      - traefik.http.middlewares.kaydan-compress.compress=true
      # --- Routeur HTTP principal ------------------------------------------
      - traefik.http.routers.odoo.rule=Host(`${ODOO_HOST:-rh.${DOMAIN}}`)
      - traefik.http.routers.odoo.entrypoints=websecure
      - traefik.http.routers.odoo.tls=true
      - traefik.http.routers.odoo.tls.certresolver=letsencrypt
      - traefik.http.routers.odoo.service=odoo
      - traefik.http.routers.odoo.middlewares=kaydan-sec@docker,kaydan-compress@docker,kaydan-ratelimit@docker
      - traefik.http.services.odoo.loadbalancer.server.port=8069
      - traefik.http.services.odoo.loadbalancer.sticky.cookie=true
      - traefik.http.services.odoo.loadbalancer.sticky.cookie.name=kaydan_affinity
      - traefik.http.services.odoo.loadbalancer.sticky.cookie.secure=true
      - traefik.http.services.odoo.loadbalancer.sticky.cookie.httponly=true
      # --- Routeur WebSocket (bus / live) sur le port gevent 8072 ----------
      - traefik.http.routers.odoo-ws.rule=Host(`${ODOO_HOST:-rh.${DOMAIN}}`) && PathPrefix(`/websocket`)
      - traefik.http.routers.odoo-ws.entrypoints=websecure
      - traefik.http.routers.odoo-ws.tls=true
      - traefik.http.routers.odoo-ws.tls.certresolver=letsencrypt
      - traefik.http.routers.odoo-ws.service=odoo-ws
      - traefik.http.routers.odoo-ws.middlewares=kaydan-sec@docker
      - traefik.http.services.odoo-ws.loadbalancer.server.port=8072
      # Watchtower : NE PAS auto-mettre à jour Odoo (migration manuelle)
      - com.centurylinklabs.watchtower.enable=false
    logging: *default-logging

  # ===========================================================================
  #  REDIS — cache / sessions partagées (OCA session_redis) — optionnel
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: kaydan-redis
    restart: unless-stopped
    <<: *hardening
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD manquant}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging: *default-logging

  # ===========================================================================
  #  pgAdmin — administration PostgreSQL
  # ===========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kaydan-pgadmin
    restart: unless-stopped
    <<: *hardening
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?manquant}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?manquant}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_LOGIN_BANNER: "\"Accès réservé — Kaydan ERP\""
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: "30"
      PGADMIN_LISTEN_PORT: "80"
      SCRIPT_NAME: ""
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - internal
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.pgadmin.rule=Host(`pgadmin.${DOMAIN}`)
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.tls=true
      - traefik.http.routers.pgadmin.tls.certresolver=letsencrypt
      - traefik.http.routers.pgadmin.middlewares=kaydan-sec@docker,kaydan-ratelimit@docker
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
      - com.centurylinklabs.watchtower.enable=true
    logging: *default-logging

  # ===========================================================================
  #  MinIO — stockage objet S3 (cible des sauvegardes chiffrées)
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: kaydan-minio
    restart: unless-stopped
    <<: *hardening
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?manquant}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?manquant}
      MINIO_BROWSER_REDIRECT_URL: https://minio.${DOMAIN}
      TZ: ${TZ:-UTC}
    volumes:
      - minio-data:/data
    networks:
      - internal
      - dokploy-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # API S3
      - traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls=true
      - traefik.http.routers.minio-api.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-api.service=minio-api
      - traefik.http.routers.minio-api.middlewares=kaydan-sec@docker
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
      # Console
      - traefik.http.routers.minio-console.rule=Host(`minio.${DOMAIN}`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls=true
      - traefik.http.routers.minio-console.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-console.service=minio-console
      - traefik.http.routers.minio-console.middlewares=kaydan-sec@docker
      - traefik.http.services.minio-console.loadbalancer.server.port=9001
      - com.centurylinklabs.watchtower.enable=true
    logging: *default-logging

  # ===========================================================================
  #  BACKUP — sauvegardes chiffrées planifiées (PG + filestore + addons + conf)
  # ===========================================================================
  backup:
    build:
      context: ./docker/backup
    image: kaydan/backup:1.0
    container_name: kaydan-backup
    restart: unless-stopped
    <<: *hardening
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-odoo}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_PASSPHRASE: ${BACKUP_PASSPHRASE}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-30}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-8}
      BACKUP_RETENTION_MONTHLY: ${BACKUP_RETENTION_MONTHLY:-12}
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
      BACKUP_S3_ENABLED: ${BACKUP_S3_ENABLED:-true}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-http://minio:9000}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-kaydan-backups}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ:-UTC}
    volumes:
      - odoo-data:/data/odoo:ro                 # filestore (lecture seule, backup)
      - odoo-data:/restore/odoo                 # filestore (lecture/écriture, restore)
      - ./addons:/data/addons:ro                # addons personnalisés
      - ./config:/data/config:ro                # configurations
      - ./scripts:/scripts:ro
      - ./backups:/backups                      # destination locale
    networks:
      - internal
    logging: *default-logging

  # ===========================================================================
  #  WATCHTOWER — mises à jour contrôlées (monitor-only par défaut)
  # ===========================================================================
  watchtower:
    image: containrrr/watchtower:latest
    container_name: kaydan-watchtower
    restart: unless-stopped
    <<: *hardening
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"        # n'agit que sur les conteneurs étiquetés
      WATCHTOWER_MONITOR_ONLY: ${WATCHTOWER_MONITOR_ONLY:-true}
      WATCHTOWER_SCHEDULE: ${WATCHTOWER_SCHEDULE:-0 0 4 * * *}
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_TIMEOUT: 60s
      TZ: ${TZ:-UTC}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    logging: *default-logging

  # ===========================================================================
  #  MONITORING — Prometheus
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: kaydan-prometheus
    restart: unless-stopped
    <<: *hardening
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - internal
    logging: *default-logging

  # ===========================================================================
  #  MONITORING — Grafana
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: kaydan-grafana
    restart: unless-stopped
    <<: *hardening
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?manquant}
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      GF_SERVER_ENFORCE_DOMAIN: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      TZ: ${TZ:-UTC}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - internal
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.tls.certresolver=letsencrypt
      - traefik.http.routers.grafana.middlewares=kaydan-sec@docker
      - traefik.http.services.grafana.loadbalancer.server.port=3000
      - com.centurylinklabs.watchtower.enable=true
    logging: *default-logging

  # ===========================================================================
  #  MONITORING — Loki (logs)
  # ===========================================================================
  loki:
    image: grafana/loki:latest
    container_name: kaydan-loki
    restart: unless-stopped
    <<: *hardening
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - internal
    logging: *default-logging

  # ===========================================================================
  #  MONITORING — Promtail (collecte de logs Docker + Odoo)
  # ===========================================================================
  promtail:
    image: grafana/promtail:latest
    container_name: kaydan-promtail
    restart: unless-stopped
    <<: *hardening
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    networks:
      - internal
    logging: *default-logging

  # ===========================================================================
  #  MONITORING — node-exporter (métriques hôte)
  # ===========================================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: kaydan-node-exporter
    restart: unless-stopped
    <<: *hardening
    command:
      - --path.rootfs=/host
      - --collector.systemd
      - --collector.processes
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - internal
    logging: *default-logging

  # ===========================================================================
  #  MONITORING — cAdvisor (métriques conteneurs)
  # ===========================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: kaydan-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - internal
    logging: *default-logging

  # ===========================================================================
  #  MONITORING — postgres-exporter (métriques PostgreSQL)
  # ===========================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: kaydan-postgres-exporter
    restart: unless-stopped
    <<: *hardening
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${PG_EXPORTER_USER:-odoo_exporter}:${PG_EXPORTER_PASSWORD}@postgres:5432/postgres?sslmode=disable"
      TZ: ${TZ:-UTC}
    networks:
      - internal
    logging: *default-logging
